function:
  name: end_call_tool
  description: |
    Ends the call. Speaks the `farewell` parameter to the merchant, then hangs up. The farewell parameter MUST be the verbatim Step 4 outcome line from the system prompt (AUTHORIZED, DENIED, UNABLE TO VERIFY, or LANGUAGE-BARRIER).
  parameters:
    type: object
    properties:
      farewell:
        type: string
        description: |
          The full text to speak before hanging up. MUST be the verbatim Step 4 outcome line that matches the Step 3 classification, copied exactly from the system prompt.
          Example for AUTHORIZED:
          "Thanks for confirming. We've removed the payout delay. Your account is secure and the update will proceed. Have a great rest of your day. Goodbye."
    required:
      - farewell
messages:
  - blocking: true
    content: "{{ farewell }}"
    type: request-start
type: endCall
