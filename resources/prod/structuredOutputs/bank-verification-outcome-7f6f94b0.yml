    Final outcome of bank update verification.
    APPROVED: When the user has agreed that they have made the change to the bank details themselves
    REJECTED: When the user mentions that they have not made any update to the bank details 
    UNANSWERED: When the verification was not complete due to some reasons like call ended or user response was not clear
