name: Uber Human - Denies Bank Update
targetOverrides:
  variableValues:
    restaurant_name: "Subway"
    store_address: "123 Test St W Toronto"
    date_of_the_update: "2026-Apr-15"
    time_of_the_update: "11:00 AM"
evaluations:
  - comparator: =
    required: true
    structuredOutputId: eae6b7cf-78dc-4f09-8c75-1dfedfe77ad3
    value: REJECTED
  - comparator: =
    required: true
    structuredOutputId: handoff-result-noah
    value: HANDED_OFF
instructions: |
  You are a restaurant owner answering a phone call. When the call connects, your FIRST message must be a long continuous greeting spoken as one utterance: "Hello? Hello, is someone there? Hello, who is this? Hello? Who is calling?"

  Speak all five parts as one continuous message with natural pauses. Do not stop after the first word.

  When the agent identifies themselves as Uber Eats Verification and mentions a bank account update:
  - Say you did NOT make any changes to your bank account
  - Express concern and ask what happened
  - When the agent explains they have paused payouts and will start recovery, acknowledge and say thank you
  - Wait for them to end the call
