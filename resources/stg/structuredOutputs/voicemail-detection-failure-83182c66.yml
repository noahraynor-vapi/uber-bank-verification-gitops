schema:
  description: |-
    Analyze the provided transcript and determine:

    1. **Was this call answered by a machine?** Look for strong indicators such as:
       - Standard voicemail greetings ("Please leave a message after the beep", "You have reached the voicemail of...", "The person you are trying to reach is not available", "No one is available to take your call")
       - Automated IVR/phone tree prompts ("Press 1 for...", "Para español oprima el 2")
       - Carrier-level intercepts ("The number you have dialed is not in service", "This voicemail box is full")
       - Repetitive or scripted phrasing with no human-like conversational engagement
       - A beep tone followed by silence or recording indicators
       - The other party never responds dynamically to anything the agent says

    2. **Did the agent invoke the voicemail detection tool?** Check whether the transcript shows any call to a voicemail detection tool/function at any point during the call.

    3. **Is this a failure?** A failure occurs when BOTH conditions are true:
       - The call was clearly answered by a machine/voicemail
       - The agent did NOT call the voicemail detection tool

    Mark this as true if this is a failure.
  type: boolean
target: messages
type: ai
